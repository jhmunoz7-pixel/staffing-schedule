<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Staffing Schedule · Apr 13–17</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #1A56E8; --blue-light: #EEF2FF; --blue-mid: #C7D2FE;
  --amber: #D97706; --amber-light: #FEF3C7;
  --purple: #7C3AED; --purple-light: #EDE9FE;
  --green: #059669; --green-light: #D1FAE5;
  --gray-50: #F9FAFB; --gray-100: #F3F4F6; --gray-200: #E5E7EB;
  --gray-300: #D1D5DB; --gray-400: #9CA3AF; --gray-500: #6B7280;
  --gray-700: #374151; --gray-900: #111827;
  --radius: 8px; --radius-lg: 12px;
  --h-appbar: 56px;
  --h-controls: 48px;
  --h-legend: 30px;
  --h-dayheader: 48px;
  --h-thead: 38px;
}
html, body { height: 100%; }
body { font-family: 'DM Sans', sans-serif; background: #ECEEF4; color: var(--gray-900); }

/* ─── STICKY LAYERS ──────────────────────────── */
.app-header {
  background: white; border-bottom: 1px solid var(--gray-200);
  padding: 0 24px; height: var(--h-appbar);
  position: sticky; top: 0; z-index: 300;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}
